# Стек наблюдаемости (опциональный). Поднимается отдельно:
#   docker compose -f docker-compose.observability.yml up -d
#
# Promtail сидит в той же docker-сети хоста и подбирает контейнеры
# через Docker socket, поэтому видит логи api/rag/postgres/etc независимо
# от того, в каком compose-проекте они запущены.
#
# UI:
#   Grafana  → http://localhost:3001  (admin / admin)
#   Loki     → http://localhost:3100  (API, не для людей)

services:
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml

  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - loki
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - grafana-data:/var/lib/grafana

volumes:
  loki-data:
  grafana-data:
