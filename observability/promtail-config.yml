# Promtail собирает логи из Docker-контейнеров и шлёт в Loki.
# Использует docker_sd — обнаруживает запущенные контейнеры через сокет.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Имя контейнера → label `container`
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # Имя docker-compose сервиса → label `service`
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      # Имя проекта (compose project) → label `project`
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
    pipeline_stages:
      # Если строка — это JSON, разбираем поля и делаем доступными в LogQL.
      - json:
          expressions:
            level: level
            msg: msg
            request_id: request_id
            user_id: user_id
            method: method
            path: path
            status: status
            duration_ms: duration_ms
      # Уровень → label, чтобы фильтровать как `{level="ERROR"}`.
      - labels:
          level:
