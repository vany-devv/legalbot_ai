# Минимальная конфигурация Loki в single-binary режиме (для разработки/диплома).
# Хранение — на локальном диске, без Cassandra/S3/Redis.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h   # 7 дней — после этого удаляются

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
