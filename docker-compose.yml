services:

  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-legalbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python RAG service ─────────────────────────────────────────────────────
  rag:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/legalbot-rag:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-legalbot}
      LLM_PROVIDER: ${LLM_PROVIDER:-gigachat}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_CLIENT_SECRET: ${GIGACHAT_CLIENT_SECRET:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-Pro}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-yandex}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Go API (auth, billing, chat, orchestrator) ─────────────────────────────
  # Migrations run automatically on startup via goose (embedded in binary)
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/legalbot-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rag:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-legalbot}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RAG_SERVICE_URL: http://rag:8000
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      ENV: ${ENV:-production}
    ports:
      - "8080:8080"

  # ── Nuxt frontend ──────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/legalbot-frontend:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
